image: node:20

stages:
  - build
  - deploy

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

variables:
  PNPM_HOME: "$CI_PROJECT_DIR/.pnpm"

before_script:
  - corepack enable
  - corepack prepare pnpm@latest --activate
  - pnpm config set store-dir .pnpm-store
  - pnpm install --frozen-lockfile --prod=false

build:
  stage: build
  script:
    - pnpm build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main

pages:
  stage: deploy
  script:
    - cp -r out/* public/
  artifacts:
    paths:
      - public
    expire_in: never
  only:
    - main
  # Ensure public access
  environment:
    name: production
    url: $CI_PAGES_URL

