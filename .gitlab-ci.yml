image: node:20

stages:
  - build
  - deploy

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

variables:
  PNPM_HOME: "$CI_PROJECT_DIR/.pnpm"

before_script:
  - corepack enable
  - pnpm config set store-dir "$CI_PROJECT_DIR/.pnpm-store"

build:
  stage: build
  script:
    - pnpm install --frozen-lockfile
    - pnpm build

pages:
  stage: deploy
  script:
    - pnpm install --frozen-lockfile
    # Static export build for GitLab Pages.
    - export NEXT_PUBLIC_CI=true
    - export NEXT_PUBLIC_SITE_URL="${CI_PAGES_URL}"
    - pnpm build
    - rm -rf public
    - mv out public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

